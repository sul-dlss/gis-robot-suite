version: 2.1
orbs:
  ruby-rails: sul-dlss/ruby-rails@4.12.0

workflows:
  build:
    jobs:
      - ruby-rails/lint:
          name: lint
          context: dlss
          executor:
            name: "ruby-rails/ruby"
            "ruby-tag": "4.0"
      - ruby-rails/test-gem:
          name: test
          context: dlss
          executor:
            name: "ruby-rails/ruby"
            "ruby-tag": "4.0"
          before-test:
            - run: sudo add-apt-repository -y ppa:ubuntugis/ubuntugis-unstable
            - run: sudo apt-get update -y
            - run: sudo apt-get install -y xsltproc libxml2-utils gdal-bin build-essential libsqlite3-dev zlib1g-dev
            - run: |
                git clone --depth 1 https://github.com/felt/tippecanoe.git
                cd tippecanoe
                make -j2
                sudo make install
